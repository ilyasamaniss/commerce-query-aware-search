name: pokemon-search-devbox

resources:
  cpus: 4+
  memory: 8+

workdir: .

envs:
  SHOPIFY_STORE_DOMAIN: null
  OLLAMA_URL: http://127.0.0.1:11434/api/generate
  OLLAMA_MODEL: gemma3:4b

secrets:
  SHOPIFY_STOREFRONT_TOKEN: null

setup: |
  set -euo pipefail

  python3 -m pip install --upgrade pip
  pip install -r requirements.txt

  if command -v apt-get >/dev/null 2>&1; then
    sudo apt-get update
    sudo apt-get install -y curl zstd
  elif command -v dnf >/dev/null 2>&1; then
    sudo dnf install -y curl zstd
  elif command -v yum >/dev/null 2>&1; then
    sudo yum install -y curl zstd
  else
    echo "No supported package manager found to install zstd/curl."
    exit 1
  fi

  curl -fsSL https://ollama.com/install.sh | sh
  ollama --version

run: |
  set -euo pipefail
  echo "Devbox ready. Start Ollama manually with: ollama serve"
  sleep infinity
