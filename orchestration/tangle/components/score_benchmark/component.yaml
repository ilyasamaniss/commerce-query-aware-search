name: score_benchmark
description: Score prediction rows and emit metrics plus failures.
metadata:
  annotations:
    owner: commerce-query-aware-search
    execution_contract: requires_local_tangle_image_with_repo_at_/app

inputs:
  - name: results
    description: Predictions JSONL artifact to score.
    type: Data
  - name: k
    description: Cutoff used when computing ranking metrics.
    type: Integer

outputs:
  - name: metrics
    description: Aggregate metrics JSON artifact.
    type: Data
  - name: failures
    description: JSONL artifact containing failed benchmark cases.
    type: Data

implementation:
  container:
    image: commerce-query-aware-search:tangle-local
    command: ["python3", "/app/scripts/score_benchmark.py"]
    args:
      - "--results"
      - { inputPath: results }
      - "--metrics-out"
      - { outputPath: metrics }
      - "--failures-out"
      - { outputPath: failures }
      - "--k"
      - { inputValue: k }
