name: compare_runs
description: Compare baseline and candidate metrics artifacts.
metadata:
  annotations:
    owner: commerce-query-aware-search
    execution_contract: requires_local_tangle_image_with_repo_at_/app

inputs:
  - name: baseline_label
    description: Human-readable label for the baseline run.
    type: String
  - name: baseline_metrics
    description: Metrics JSON artifact for the baseline run.
    type: Data
  - name: candidate_label
    description: Human-readable label for the candidate run.
    type: String
  - name: candidate_metrics
    description: Metrics JSON artifact for the candidate run.
    type: Data


outputs:
  - name: comparison_json
    description: Structured JSON comparison artifact.
    type: Data
  - name: comparison_md
    description: Markdown report comparing the two runs.
    type: Data

implementation:
  container:
    image: commerce-query-aware-search:tangle-local
    command: ["python3", "/app/scripts/compare_runs.py"]
    args:
      - "--baseline-metrics"
      - { inputPath: baseline_metrics }
      - "--candidate-metrics"
      - { inputPath: candidate_metrics }
      - "--out-json"
      - { outputPath: comparison_json }
      - "--out-md"
      - { outputPath: comparison_md }
      - "--baseline-label"
      - { inputValue: baseline_label }
      - "--candidate-label"
      - { inputValue: candidate_label }
